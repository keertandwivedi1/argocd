apiVersion: argoproj.io/v1alpha1
 
kind: Application
 
metadata:
  name: istio-demo
 
  namespace: argocd
 
spec:
 
  project: default
 
  source:
 
    repoURL: https://github.com/keertandwivedi1/argocd.git
 
    targetRevision: HEAD
 
    path: app
 
  destination:
 
    server: https://kubernetes.default.svc
 
    namespace: demo
 
  syncPolicy:
 
    automated:
 
      prune: true
 
      selfHeal: true
